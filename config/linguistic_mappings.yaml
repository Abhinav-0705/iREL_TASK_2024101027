    - "pehle"
    - "baad mein"
    - "ke baad"
    - "zaroori hai"
    - "jaruri hai"
    - "chahiye"
    - "se pehle"
    - "depend karta hai"
    - "iske liye"
    
  hinglish:
    - "understand karne ke liye"
    - "pehle samajhna padega"
    - "ke baad hi"
    - "depend karta"
